---
platform: linux
image_resource:
  type: registry-image
  source:
    repository: cfbuildpacks/ci
    username: ((cfbuildpacks-dockerhub-user.username))
    password: ((cfbuildpacks-dockerhub-user.password))
inputs:
  - name: buildpacks-ci
  - name: builds
  - name: cflinuxfs4-builds-metadata
    optional: true
  - name: cflinuxfs5-builds-metadata
    optional: true
outputs:
  - name: merged-builds-metadata
run:
  path: buildpacks-ci/tasks/merge-builds-metadata/merge.sh
params:
  GIT_USER_EMAIL:
  GIT_USER_NAME:
